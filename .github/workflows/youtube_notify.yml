name: 🎬 YouTube新着動画通知

on:
  schedule:
    # 1時間ごとに実行（JST の毎時0分）
    - cron: '0 * * * *'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  check-youtube:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: 既知動画データのキャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/known_videos.json
          key: known-videos-${{ github.run_id }}
          restore-keys: |
            known-videos-

      - name: YouTube新着チェック＆通知を実行
        env:
          DISCORD_YOUTUBE_WEBHOOK_URL: ${{ secrets.DISCORD_YOUTUBE_WEBHOOK_URL }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          python src/youtube_notify_action.py
